name: CD - Continuous Deployment

on:
  push:
    branches: 
      - main
      - 'release/**'

# Prevent concurrent deployments to the same environment
concurrency: 
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore ResumeSpy.sln

      - name: Build solution
        run: dotnet build ResumeSpy.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test ResumeSpy.sln --configuration Release --no-build --verbosity normal

  deploy-dev:
    name: Deploy to DEV
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: DEV

    steps:
      - name: Deploy to Render (DEV)
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [[ -z "${RENDER_DEPLOY_HOOK_URL}" ]]; then
            echo "RENDER_DEPLOY_HOOK_URL is not set."
            exit 1
          fi
          curl -fsS -X POST "${RENDER_DEPLOY_HOOK_URL}"

      - name: Wait for deployment to be healthy
        env:
          HEALTH_URL: ${{ vars.DEV_HEALTH_URL }}
        run: |
          if [[ -z "${HEALTH_URL}" ]]; then
            echo "::warning::DEV_HEALTH_URL not configured, skipping health check"
            exit 0
          fi
          echo "Waiting 60s for Render to start building..."
          sleep 60
          echo "Polling ${HEALTH_URL} ..."
          for i in $(seq 1 30); do
            if curl -fsS --max-time 10 "${HEALTH_URL}" > /dev/null 2>&1; then
              echo "✅ Health check passed on attempt ${i}"
              exit 0
            fi
            echo "Attempt ${i}/30 failed, retrying in 20s..."
            sleep 20
          done
          echo "❌ Health check failed after 30 attempts (10+ minutes)"
          exit 1

  deploy-prod:
    name: Deploy to PROD
    needs: build-and-test
    if: startsWith(github.ref, 'refs/heads/release/')
    runs-on: ubuntu-latest
    environment: PROD

    steps:
      - name: Deploy to Render (PROD)
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_PROD_DEPLOY_HOOK_URL }}
        run: |
          if [[ -z "${RENDER_DEPLOY_HOOK_URL}" ]]; then
            echo "RENDER_PROD_DEPLOY_HOOK_URL is not set."
            exit 1
          fi
          curl -fsS -X POST "${RENDER_DEPLOY_HOOK_URL}"

      - name: Wait for deployment to be healthy
        env:
          HEALTH_URL: ${{ vars.PROD_HEALTH_URL }}
        run: |
          if [[ -z "${HEALTH_URL}" ]]; then
            echo "::warning::PROD_HEALTH_URL not configured, skipping health check"
            exit 0
          fi
          echo "Waiting 60s for Render to start building..."
          sleep 60
          echo "Polling ${HEALTH_URL} ..."
          for i in $(seq 1 30); do
            if curl -fsS --max-time 10 "${HEALTH_URL}" > /dev/null 2>&1; then
              echo "✅ Health check passed on attempt ${i}"
              exit 0
            fi
            echo "Attempt ${i}/30 failed, retrying in 20s..."
            sleep 20
          done
          echo "❌ Health check failed after 30 attempts (10+ minutes)"
          exit 1
          curl -fsS -X POST "${RENDER_DEPLOY_HOOK_URL}"
